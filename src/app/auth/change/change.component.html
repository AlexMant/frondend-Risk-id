 
 
  
        <div class="card ">

          <div class="card-body">

            <div >
              <div class="d-flex justify-content-center py-4">
                <a routerLink="/dashboard" class="logo d-flex align-items-center w-auto">
                  <img src="assets/img/logo_sin_fondo.png" alt="">
                  <!-- <span class="d-none d-lg-block">RISK-ID</span> -->
                </a>
              </div><!-- End Logo -->
              <h5 class="card-title text-center pb-0 fs-4">Cambiar Contraseña</h5>
              <!-- <p class="text-center small card-subitulo">Ingrese su usuario</p> -->
            </div>
        <form #forgotForm="ngForm" class="row g-3 font-4"
          (ngSubmit)="change(forgotForm)">

          <!-- <p class="mb-4">Por favor ingrese las contraseña</p> -->

          <mat-form-field appearance="outline" class="w-100 ">
            <mat-label>Contraseña</mat-label>
            <input matInput type="password" id="password" name="password" [(ngModel)]="credentials.vpassword"
              placeholder="*********">
            <mat-icon class="material-symbols-outlined me-2 text-primary" matPrefix>key</mat-icon>
            <mat-error>Campo obligatorio</mat-error>
          </mat-form-field>

          <mat-form-field appearance="outline" class="w-100 ">
            <mat-label>Repetir Contraseña</mat-label>
            <input matInput type="password" id="password2" name="password2" [(ngModel)]="credentials.vpassword_tmp"
              placeholder="*********">
            <mat-icon class="material-symbols-outlined me-2 text-primary" matPrefix>key</mat-icon>
            <mat-error>Campo obligatorio</mat-error>
          </mat-form-field>
          <button class="btn btn-primary text-light w-100 py-2  " *ngIf="!preloader" type="submit" [disabled]="!forgotForm.valid">
            Cambiar
          </button>
          <app-preloader *ngIf="preloader" size="small" message=""></app-preloader>
        </form>

      </div>
    </div>
