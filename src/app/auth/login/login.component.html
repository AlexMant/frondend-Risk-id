<main  class="fondo-login">
<div class="container">

  <section class="section register min-vh-100 d-flex flex-column align-items-center justify-content-center py-4">
    <div class="container">
      <div class="row justify-content-center">
        <div class="col-lg-4 col-md-6 d-flex flex-column align-items-center justify-content-center">

          <div class="d-flex justify-content-center py-4">
            <a routerLink="/dashboard" class="logo d-flex align-items-center w-auto">
              <img src="assets/img/logo_sin_fondo.png" alt="">
              <!-- <span class="d-none d-lg-block">RISK-ID</span> -->
            </a>
          
          </div><!-- End Logo -->

          <div class="card mb-3">

            <div class="card-body">

              <div class="pt-4 pb-2">
                <h5 class="card-title text-center pb-0 fs-4">Inicio de Sesión </h5>
                <p class="text-center small card-subitulo">Ingrese su usuario y contraseña</p>
              </div>

              
              <form class="row g-3 " [formGroup]="loginForm">
                <div class="col-12">
                  <label  class="form-label">Usuario</label>
                  <div class="input-group  ">

                    <input type="text" class="form-control" formControlName="mail" (blur)="validarmail()"
                      [ngClass]="{ 'is-invalid':  submittedLogin &&  validaCampodLogin('mail') == 'INVALID' }"
                      placeholder="E-mail">
                    <div class="invalid-feedback">Por favor ingrese su usuario</div>
                  </div>
                </div>

                <div class="col-12">
                  <label for="yourPassword" class="form-label">Contraseña</label>
                  <input [type]="hide3 ? 'text' : 'password'" class="form-control" formControlName="vpassword"
                    [ngClass]="{ 'is-invalid':   submittedLogin &&  validaCampodLogin('vpassword') == 'INVALID' }"
                    placeholder="*******">
                  <div class="invalid-feedback">Por favor ingrese su password!</div>
                </div>

                <!-- <div class="col-12">
                  <div class="form-check">
                    <input class="form-check-input" type="checkbox" name="remember" value="true" id="rememberMe">
                    <label class="form-check-label" for="rememberMe">Recordar</label>
                  </div>
                </div> -->
                <div *ngIf="errorlogin" class=" alert alert-danger  ">{{errorlogin}}</div>
                <div class="col-12">
                  <button *ngIf="!preloader"  class="btn btn-primary text-light w-100 py-2 mb-2 "
                    (click)="loginusuario()" >
                    Iniciar Sesión
                  </button>
                  <app-preloader *ngIf="preloader" size="small" message=""></app-preloader>
              
                </div>
                <div class="col-12 " style="display: grid; place-items: center;" >
                 
                    
                    <button type="button" class="  nav-link indigo-text text-darken-4 titulo-cerrar font-2" (click)="recuperarPas()">Recuperar Contraseña</button>
                </div>
              </form>

            </div>
          </div>



        </div>
      </div>
    </div>

  </section>

</div>
</main>
