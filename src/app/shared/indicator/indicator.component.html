<table class=" font-4  text-light">
    <tr>

        <ng-container *ngFor="let indicator of indicators; let last = last; let first = first" class="mx-0 py-1">
            <td>
                <table>
                    <tr>
                        <td> <span [ngClass]="indicator.norma.success ? 'bg-success' : 'bg-danger'"
                                class="p-1  rounded-pill ">{{
                                indicator.norma.val }}</span>
                        </td>
                        <td>&nbsp;</td>
                        <ng-container *ngFor="let cod of indicator.codes">
                            <td [ngClass]="cod.success ? 'bg-success' : 'bg-danger'" class="p-1  rounded-pill ">
                                <span>{{ cod.cod }}</span>
                            </td>
                        </ng-container>
                    </tr>
                </table>
            </td>


            <ng-container *ngIf="indicator.workingDay" matTooltip="Jornadas y horas">
                <td>
                    <span [ngClass]="indicator.workingDay.success ? 'bg-success' : 'bg-danger'"
                        class=" p-1 rounded-pill ">{{indicator.workingDay.val|round:2
                        }}h</span>
                </td>
                <td style="color:#c6c6c6">&nbsp;/&nbsp;</td>
                <td> <span [ngClass]="indicator.hours.success ? 'bg-success': 'bg-danger'"
                        class=" p-1  rounded-pill ">{{ indicator.hours.val1 |round:2}}h</span>

                    <span [ngClass]="indicator.hours.success ? 'bg-success': 'bg-danger'"
                        class=" p-1  rounded-pill ">({{
                        indicator.hours.val2
                        |round:2}})</span>
                </td>
            </ng-container>


        </ng-container>
    </tr>
</table>
