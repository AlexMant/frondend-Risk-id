<header class="row mx-0 px-3 py-2 top-0 left-0 " [ngClass]="{
    'cer-shadow rounded' : border,
    'mb-2' : marginBottom,
    'bg-white' : theme == 'light',
    'bg-primary text-light' : theme == 'dark',
    'position-sticky' : sticky
}">
  <div class="d-flex align-items-center col-10 col-lg-6 ps-0  ">
    <button *ngIf="back" (click)="location.back()" mat-icon-button>
      <mat-icon class="material-symbols-outlined me-2">arrow_back</mat-icon>
    </button>
    <button *ngIf="backModal" mat-dialog-close mat-icon-button>
      <mat-icon class="material-symbols-outlined me-2">arrow_back</mat-icon>
    </button>

    <button *ngIf="arrowBack&&arrowBackPath==''" (click)="actionBack.emit()" mat-icon-button>
      <mat-icon class="material-symbols-outlined me-2">arrow_back</mat-icon>
    </button>
    <button *ngIf="arrowBack&&arrowBackPath!=''" [backButton]="arrowBackPath" mat-icon-button>
      <mat-icon class="material-symbols-outlined me-2">arrow_back</mat-icon>
    </button>
    <h1 class="h5 mb-0 fw-bold">{{ title }}</h1>
  </div>
  <div class="d-flex align-items-center justify-content-end col-2 col-lg-6 pe-0">

    <ng-container *ngIf="!platform.ANDROID && !platform.IOS">
      <div class="d-flex">
        <button type="button" mat-icon-button *ngFor="let icon of icons" [matTooltip]="icon.tooltip"
          (click)="actionIcon.emit(icon.event)">
          <mat-icon class="material-symbols-outlined">{{ icon.icon }}</mat-icon>
        </button>
      </div>
      <button type="button" *ngIf="btnText != ''" (click)="actionPrimary.emit()" class="btn btn-primary text-light ms-3">
        <mat-icon class="material-symbols-outlined align-middle me-1">{{ btnIcon }}</mat-icon>
        <span class="align-middle">{{ btnText }}</span>
      </button>


    </ng-container>

    <!-- MOBILE -->
    <ng-container *ngIf="platform.ANDROID || platform.IOS">
      <button *ngIf="icons.length > 0 || btnText != ''" type="button" mat-icon-button [matMenuTriggerFor]="menu">
        <mat-icon class="material-symbols-outlined">more_vert</mat-icon>
      </button>
      <mat-menu #menu="matMenu">
        <button type="button" *ngIf="btnText != ''" mat-menu-item (click)="actionPrimary.emit()">
          <mat-icon class="material-symbols-outlined">{{ btnIcon }}</mat-icon>
          {{ btnText }}
        </button>
        <button type="button" mat-menu-item *ngFor="let icon of icons" (click)="actionIcon.emit(icon.event)">
          <mat-icon class="material-symbols-outlined">{{ icon.icon }}</mat-icon>
          {{ icon.tooltip }}
        </button>
      </mat-menu>
    </ng-container>
    <!-- MOBILE -->

  </div>
</header>
