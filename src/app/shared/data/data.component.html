<div class="mb-2 d-inline-block" *ngIf="arrayData.length === 0">
    <ng-container *ngTemplateOutlet="info; context{title, data}"></ng-container>
</div>

<div class="row" *ngIf="arrayData.length > 0">
    <div class="col-12 col-sm-6 col-md-4 col-lg-3 col-xl-2 mb-2" *ngFor="let item of arrayData">
        <ng-container *ngTemplateOutlet="info; context{title: item.title, data:item.data}"></ng-container>
    </div>
</div>

<ng-template #info let-title="title" let-data="data">
    <span class="d-block font-2">{{ title }}</span>
    <strong class="font-4">{{ data }}</strong>
</ng-template>
