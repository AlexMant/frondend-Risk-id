<div class="pagetitle">
    <h1>Cotización</h1>
    <nav>
      <ol class="breadcrumb">
        <li class="breadcrumb-item"><a routerLink="/dashboard">Home</a></li>
        <!-- <li class="breadcrumb-item">Gestión</li> -->
        <li class="breadcrumb-item active">Agregar cotización</li>
      </ol>
    </nav>
  </div><!-- End Page Title -->

  <app-preloader *ngIf="preloader" size="small" message="Generando cotización....."></app-preloader>

  <app-container *ngIf="!preloader" >
  
    <app-block>
    <div class="card ">
      <div class="card-body">
          <h5 class="card-title">Datos generales</h5>  
        <form class="row font-4 mt-2" [formGroup]="mantenedorFormSolUser">
           
          <div class="col-12 col-ms-6 col-md-12">
            <mat-form-field appearance="outline" class="w-100">
              <mat-label>Observación cotización</mat-label>
              <!-- <input matInput formControlName="vobservacion" autocomplete="off" /> -->
              <textarea matInput maxlength="999" cols="50" rows="5" formControlName="observacion"
                autocomplete="off"></textarea>
            </mat-form-field>
          </div>
          <div class="col-12 col-ms-6 col-md-6">
            <mat-form-field appearance="outline" class="w-100  ">
              <mat-label>Dirección </mat-label>
              <mat-select formControlName="ididreccion">
                 <mat-option value="">Seleccione</mat-option>  
                <mat-option *ngFor="let _datadirecciones of datadirecciones" [value]="_datadirecciones.ididreccion">
                  <span>{{_datadirecciones.desdireccion}}</span>
                </mat-option>
              </mat-select>
              <mat-hint>Dirección de destino de los dispositvios</mat-hint>
              <mat-error *ngIf="mantenedorFormSolUser.get('ididreccion').hasError('required')">
                Dirección es <strong>Requerido</strong>
              </mat-error>
            </mat-form-field>
          </div>
        </form>
      </div>
  
    </div>
    </app-block>
    <div class="card"  >
      <div class="card-body">
        
        <h5 class="card-title"  >Hardware nuevo</h5>
        <div class="row">
          <app-block>
            <div class="col-12 col-ms-6 col-md-12 text-end font-3">
  
             
              <button type="button"   (click)="hardwareNuevo()"
                class="btn btn-success text-light ms-3">
                <mat-icon class="material-symbols-outlined align-middle me-1">store</mat-icon>
                <span class="align-middle">Tienda GTEK</span>
              </button>
            </div>
          </app-block>
        </div>
  
  
         <app-form-hardware-new-cotizacion  [modeloaddnewsol]="modeloaddnewsol"
          (guardar)="guardarnewhardware()"></app-form-hardware-new-cotizacion>
  
        

         
         <app-list-hardware-new-cotizacion  
          [tableData]="vmP.detallaherdsolicitud"></app-list-hardware-new-cotizacion>
  
  
      </div>
    </div>
    <app-block>
      <div class="row">
        <div class="col-12 col-ms-6 col-md-12 text-end font-3">
  
          <button type="button"  (click)="guardar()" class="btn btn-primary text-light ms-3">
            <mat-icon class="material-symbols-outlined align-middle me-1">send</mat-icon>
            <span class="align-middle">Enviar</span>
          </button>
          <button type="button" (click)="volver()" class="btn btn-danger text-light ms-3">
            <!-- <mat-icon class="material-symbols-outlined align-middle me-1">arrow_back_ios</mat-icon> -->
            <span class="align-middle">Volver</span>
        </button>
        </div>
      </div>
    </app-block>
  </app-container>
