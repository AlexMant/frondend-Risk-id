<header class="row mx-0 px-3 py-2 top-0 left-0 mb-2 bg-white position-sticky">
    <div class="d-flex align-items-center w-100 justify-content-between">
        <h1 class="h5 mb-0 fw-bold flex-grow-1 text-truncate">Agregar {{nombremodal}}</h1>
        <button type="button" mat-icon-button [matTooltip]="'Cerrar'" (click)="closeAction()">
            <mat-icon class="material-symbols-outlined">close</mat-icon>
        </button>
    </div>
</header>


<ng-container>
    <app-block>

        

        <form class="row font-3" [formGroup]="mantenedorForm">

            <div class="col-12 col-ms-6 col-md-12">
                <mat-form-field appearance="outline" class="w-100">
                  <mat-label>Nombre</mat-label>
                  <input matInput formControlName="nombre" autocomplete="off" />
                </mat-form-field>
              </div>
         
        
           
            <div class="col-12 col-ms-4 col-md-12 text-end">

                <button class="btn btn-accent text-light py-2 mt-1 me-1" (click)="agregar()"
                    [disabled]="mantenedorForm.invalid">
                    <mat-icon class="material-symbols-outlined align-middle me-2">
                        save
                    </mat-icon>
                    <span class="align-text-top">Guardar</span>
                </button>

            </div>

        </form>
    </app-block>


</ng-container>
