<app-container>

    <app-block class="d-block text-center   ">
      <!-- Cabecera -->
      <div style="padding: 10px; ">


        <div class="row  ">
          <div class="col-md-12">
            <h1 style="line-height: 1.2; font-weight: bold;font-size: 30px; margin: 0 0 0 0">
              <span class="text-primary">Bienvenidos</span>
              <span class="text-muted"> a nuestro sitio web </span><br>

            </h1>
          </div>
        </div>
        <!-- <mat-divider class="mb-2 bg-primary"></mat-divider> -->

        <div class="row ">
          <div class="col-md-12">
            <h6 class="text-muted">Visualización de estadísticas.</h6>
          </div>
        </div>



      </div>

    </app-block>



    <app-block>

      <form class="row font-3" [formGroup]="filtrobusquedadasboard">
       <div class="col-12 col-sm-6 col-md-1"></div>
       <div class="col-12 col-sm-6 col-md-3">
          <mat-form-field appearance="outline" class="w-100 font-2">
            <mat-label>Centro de trabjo</mat-label>
            <mat-select formControlName="idcentrodetrabajo" class="font-3">
              <mat-option class="font-4" value="">Seleccione</mat-option>
              <mat-option class="font-4" *ngFor="let p of centrosdetrabajo" [value]="p.id">{{p.nombre}}</mat-option>
            </mat-select>
          </mat-form-field>
        </div>

          <mat-form-field appearance="outline" class="w-100 font-2">

              <mat-option *ngFor="let year of years" [value]="year">{{ year }}</mat-option>
            </mat-select>
          </mat-form-field>
        </div>
        <div class="col-12 col-md-3">
          <mat-form-field appearance="outline" class="w-100 font-2">

          </mat-form-field>
        </div> -->
        <div class="col-12 col-sm-6 col-md-3">
          <mat-form-field appearance="outline" class="w-100">
            <mat-label>Desde</mat-label>
            <input matInput formControlName="fecha_desde" [matDatepicker]="fecha_desde">
            <mat-hint>DD/MM/AAAA</mat-hint>
            <mat-datepicker-toggle matSuffix [for]="fecha_desde"></mat-datepicker-toggle>
            <mat-datepicker #fecha_desde></mat-datepicker>
          </mat-form-field>
        </div>

        <div class="col-12 col-sm-6 col-md-3">
          <mat-form-field appearance="outline" class="w-100">
            <mat-label>Hasta</mat-label>
            <input matInput formControlName="fecha_hasta" [matDatepicker]="fecha_hasta">
            <mat-hint>DD/MM/AAAA</mat-hint>
            <mat-datepicker-toggle matSuffix [for]="fecha_hasta"></mat-datepicker-toggle>
            <mat-datepicker #fecha_hasta></mat-datepicker>
          </mat-form-field>
        </div>
        <div class="col-12 col-sm-6 col-md-2">
          <button type="button" (click)="filtrar()" class="btn btn-primary text-light ms-3">
            <!-- <mat-icon class="material-symbols-outlined align-middle me-1">search</mat-icon> -->
            <span class="align-middle">Mostrar</span>
          </button>


        </div>

      </form>
    </app-block>

      <div class="row mt-4">
        <div class="col-md-6 d-flex">
          <div class="charts flex-grow-1 shadow-lg p-3 mb-5 bg-body rounded">
            <apx-chart [series]="chartOptions1.series" [chart]="chartOptions1.chart" [xaxis]="chartOptions1.xaxis"
              [dataLabels]="chartOptions1.dataLabels" [grid]="chartOptions1.grid" [stroke]="chartOptions1.stroke"
              [title]="chartOptions1.title" [responsive]="chartOptions1.responsive">
            </apx-chart>
          </div>
        </div>
        <div class="col-md-6 d-flex">
