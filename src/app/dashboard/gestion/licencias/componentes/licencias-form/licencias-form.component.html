<app-container>
  <app-block title="Ingreso de datos">
    <form class="row" [formGroup]="mantenedorForm">
 <div class="col-12 col-ms-6 col-md-4">
        <mat-form-field appearance="outline" class="w-100">
          <mat-label>trabajadorId</mat-label>
          <input matInput formControlName="trabajadorId" autocomplete="off"/>
        </mat-form-field>
      </div>

                    <div class="col-12 col-ms-6 col-md-4">
        <mat-form-field appearance="outline" class="w-100">
          <mat-label>flashId</mat-label>
          <input matInput formControlName="flashId" autocomplete="off"/>
        </mat-form-field>
      </div>

                    <div class="col-12 col-ms-6 col-md-4">
        <mat-form-field appearance="outline" class="w-100">
          <mat-label>fechaInicio</mat-label>
          <input matInput formControlName="fechaInicio" autocomplete="off"/>
        </mat-form-field>
      </div>

                    <div class="col-12 col-ms-6 col-md-4">
        <mat-form-field appearance="outline" class="w-100">
          <mat-label>fechaTermino</mat-label>
          <input matInput formControlName="fechaTermino" autocomplete="off"/>
        </mat-form-field>
      </div>

                    <div class="col-12 col-ms-6 col-md-4">
        <mat-form-field appearance="outline" class="w-100">
          <mat-label>tipolicenciaId</mat-label>
          <input matInput formControlName="tipolicenciaId" autocomplete="off"/>
        </mat-form-field>
      </div>

                    

     
      

    </form>
  </app-block>

  <app-btns-actions
    (actionSecondary)="btnCancelar()"
    (actionPrimary)="btnGuardar()"
    icon="save"
    text-primary="Guardar"
    text-secondary="Cancelar"
    [disabled-p]="mantenedorForm.invalid"
  ></app-btns-actions>
</app-container>
