<app-container>
  <app-block title="Ingreso de datos">
    <form class="row  font-4" [formGroup]="mantenedorForm">
      <div class="col-12 col-ms-6 col-md-8 mb-1" *ngIf="mostrarEmpresa">
        <mat-form-field appearance="outline" class="w-100">
          <mat-label>Empresa</mat-label>
          <!-- <input matInput formControlName="id_empresa_recolectora" autocomplete="off" /> -->
          <mat-select formControlName="empresaId"  (openedChange)="myInput.focus()">
            <input class="myInput font-3" maxlength="30" #myInput matInput focused="'true'" type="text"
              (keyup)="search2($event )" autocomplete="off" placeholder="Buscar Empresa">
            <mat-option class="font-4" value="0">Seleccione</mat-option>
            <mat-option class="font-4" *ngFor="let _dataEmpresa of selectedempresa" [value]="_dataEmpresa.id">
              <span>{{_dataEmpresa.nombre}}</span>

            </mat-option>
          </mat-select>
          <mat-hint class="font-1">Empresas asociadas al trabajador</mat-hint>
        </mat-form-field>

      </div>

      <div class="col-12 col-ms-6 col-md-8 ">
        <mat-form-field appearance="outline" class="w-100">
          <mat-label>Nombre</mat-label>
          <input matInput formControlName="nombre" autocomplete="off" />
        </mat-form-field>
      </div>
      <div class="col-12 col-ms-6 col-md-12"></div>

       <div class="col-12 col-ms-6 col-md-4">
        <mat-form-field appearance="outline" class="w-100">
          <mat-label>RUT</mat-label>
          <input matInput formControlName="rut" placeholder="12345678-9" (blur)="validaRut()" autocomplete="off" />
          <mat-error *ngIf="mantenedorForm.get('rut')?.hasError('required')">
            RUT es <strong>Requerido</strong>
          </mat-error>
        </mat-form-field>
      </div>

      <div class="col-12 col-ms-6 col-md-4">
        <mat-form-field appearance="outline" class="w-100">
          <mat-label>telefono</mat-label>
          <input matInput formControlName="telefono" autocomplete="off" />
        </mat-form-field>
      </div>

      <!-- <div class="col-12 col-ms-6 col-md-6">
        <mat-form-field appearance="outline" class="w-100">
          <mat-label>email</mat-label>
          <input matInput formControlName="email" autocomplete="off" />
        </mat-form-field>
      </div> -->
        <div class="col-12 col-ms-6 col-md-8">
        <mat-form-field appearance="outline" class="w-100">
          <mat-label>E-mail</mat-label>
          <input matInput formControlName="email" (change)="validarmail()" maxlength="50" autocomplete="off" />
          <mat-error class="font-1" *ngIf="mantenedorForm.get('email') && !mantenedorForm.get('email')?.hasError('required')">
            {{errorMail}}
          </mat-error>
          <mat-error class="font-1" *ngIf="mantenedorForm.get('email')?.hasError('required')">
            E-mail es <strong>Requerido</strong>
          </mat-error>
        </mat-form-field>
      </div>


      <div class="col-12 col-ms-6 col-md-8">
        <mat-form-field appearance="outline" class="w-100">
          <mat-label>direccion</mat-label>
          <input matInput formControlName="direccion" autocomplete="off" />
        </mat-form-field>
      </div>

      <!-- <div class="col-12 col-ms-6 col-md-4">
        <mat-form-field appearance="outline" class="w-100">
          <mat-label>empresaId</mat-label>
          <input matInput formControlName="empresaId" autocomplete="off"/>
        </mat-form-field>
      </div> -->






    </form>
  </app-block>

  <app-btns-actions (actionSecondary)="btnCancelar()" (actionPrimary)="btnGuardar()" icon="save" text-primary="Guardar"
    text-secondary="Cancelar" [disabled-p]="mantenedorForm.invalid || !editarform"></app-btns-actions>
</app-container>
