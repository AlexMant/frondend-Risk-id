<div class="pagetitle">
    <h1>Administrar mapa de procesos</h1>
    <nav>
        <ol class="breadcrumb">
            <li class="breadcrumb-item"><a routerLink="/dashboard">Home</a></li>
            <!-- <li class="breadcrumb-item">Gestión</li> -->
            <li class="breadcrumb-item active">Mapa de procesos</li>
           
        </ol>
   
    </nav>
      <mat-divider></mat-divider>
</div><!-- End Page Title -->

 <app-container>
    <app-block>
   <form class="row text-center p-2 font-3" [formGroup]="mantenedorForm">
     <!-- *ngIf="mostrarEmpresa" -->
            <div class="col-12 col-ms-6 col-md-12 mb-1">
                <mat-form-field appearance="outline" class="w-100">
                    <mat-label>Centros de trabajos</mat-label>
                    <!-- <input matInput formControlName="id_empresa_recolectora" autocomplete="off" /> -->
                    <mat-select formControlName="id_centro_de_trabajo_" (openedChange)="myInput.focus()"
                         >
                        <input class="myInput font-3" maxlength="30" #myInput matInput focused="'true'" type="text"
                            (keyup)="search2($event )" autocomplete="off" placeholder="Buscar Empresa">
                        <mat-option class="font-4" value="0">Seleccione</mat-option>
                        <mat-option class="font-4" *ngFor="let _dataEmpresa of selectedcentrodetrabajos"
                            [value]="_dataEmpresa.id">
                            <span>{{_dataEmpresa.nombre}}</span>
                            
                        </mat-option>
                    </mat-select>
                    <mat-hint  class="fw-medium font-1 ">Centro de  trabajo asociado</mat-hint>
                </mat-form-field>

            </div>
           


        </form>

          <div class="col-12 col-ms-12 col-md-12 text-end">
            <button type="button" (click)="getData()" class="btn btn-success text-light ms-3 font-4">
                <mat-icon class="material-symbols-outlined align-middle me-1">search</mat-icon>
                <span class="align-middle">Buscar</span>
            </button>
            <button type="button" (click)="add()" class="btn btn-primary text-light ms-3 font-4">
                <mat-icon class="material-symbols-outlined align-middle me-1">Add</mat-icon>
                <span class="align-middle">Agregar</span>
            </button>
          </div>

</app-block>
</app-container>
