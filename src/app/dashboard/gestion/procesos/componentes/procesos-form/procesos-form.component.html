<app-container>
  <app-block title="Ingreso de datos">
    <form class="row font-3" [formGroup]="mantenedorForm">
      <!-- Campo oculto para id del proceso -->
      <!-- <input type="hidden" formControlName="id" />
    <div class="col-12 col-ms-6 col-md-4">
      <mat-slide-toggle formControlName="esta_activo">Activo</mat-slide-toggle>
    </div> -->
<!-- *ngIf="mostrarEmpresa" -->
      <div class="col-12 col-ms-6 col-md-12 mb-1" >
        <mat-form-field appearance="outline" class="w-100">
          <mat-label>Centros de trabajos</mat-label>
          <!-- <input matInput formControlName="id_empresa_recolectora" autocomplete="off" /> -->
          <mat-select formControlName="id_centro_de_trabajo_" (openedChange)="myInput.focus()">
            <input class="myInput font-3" maxlength="30" #myInput matInput focused="'true'" type="text"
              (keyup)="search2($event )" autocomplete="off" placeholder="Buscar Empresa">
            <mat-option class="font-4" value="0">Seleccione</mat-option>
            <mat-option class="font-4" *ngFor="let _dataEmpresa of selectedcentrodetrabajos" [value]="_dataEmpresa.id">
              <span>{{_dataEmpresa.nombre}}</span>

            </mat-option>
          </mat-select>
          <mat-hint  class="fw-medium font-1 ">Centro de trabajo asociado</mat-hint>
        </mat-form-field>

      </div>

      <div class="col-12 col-ms-6 col-md-8">
        <mat-form-field appearance="outline" class="w-100">
          <mat-label>Nombre Procesos</mat-label>
          <input   matInput formControlName="nombre" autocomplete="off" />
        </mat-form-field>
      </div>

      <div class="col-12 col-ms-6 col-md-4">
        <mat-form-field appearance="outline" class="w-100">
          <mat-label>Orden</mat-label>
          <input matInput formControlName="n_orden" type="number" min="0" max="999" autocomplete="off" />
        </mat-form-field>
      </div>






    </form>

    <app-block >
      <div class="mb-2">
        <button mat-raised-button color="primary" class="font-3" (click)="agregarSubproceso()" [disabled]="!editarform">Agregar Actividad</button>
      </div>
      <div class="row font-3">
        <ng-container *ngFor="let sub of subprocesosFormArray.controls; let i = index">
        
            <mat-card class="p-2 mb-1 w-100">
              <div class="d-flex justify-content-between align-items-center mb-2">
                <div class="fw-bold">Actividad {{ i + 1 }}</div>
                  
                <div>
                
                  <ng-container *ngIf="sub.get('id')?.value != null; else eliminarBtnCard">
                    <mat-slide-toggle [formControl]="asFormControl(sub.get('esta_activo'))">Activo</mat-slide-toggle>
                  </ng-container>
                  <ng-template #eliminarBtnCard>
                    <button mat-icon-button color="warn" (click)="eliminarSubproceso(i)" matTooltip="Eliminar Actividad" [disabled]="!editarform" >
                      <mat-icon>delete</mat-icon>
                    </button>
                  </ng-template>
                </div>
              </div>
              <div class="row">
                <div class="col-md-10">
                  <mat-form-field appearance="outline" class="w-100">
                    <mat-label>Nombre</mat-label>
                    <input matInput [formControl]="asFormControl(sub.get('nombre'))"  placeholder="Nombre" />
                  </mat-form-field>
                </div>
                 <div class="col-md-2  ">
                  <mat-form-field appearance="outline" class="w-100">
                    <mat-label>Orden</mat-label>
                    <input matInput [formControl]="asFormControl(sub.get('n_orden'))" placeholder="Orden" type="number" />
                  </mat-form-field>
                </div>
                <!-- <div class="col-md-12"></div>
                <div class="col-md-12  ">
                  <mat-form-field appearance="outline" class="w-100">
                    <mat-label>Detalles</mat-label>
                    <textarea matInput [formControl]="asFormControl(sub.get('detalles'))"   placeholder="Detalles" rows="2"></textarea>
                  </mat-form-field>
                </div> -->
               
              </div>
              <!-- TAREAS -->
               <div class="row align-items-end">
               
                  <div class="col-auto ms-auto">
                  <button mat-icon-button color="primary"  (click)="agregarTarea(sub)" matTooltip="Agregar tarea" [disabled]="!editarform">
                    <mat-icon>add</mat-icon> 
                  </button>
                  </div>
                </div>
              <div *ngIf="tareasFormArray(sub).length">
              
                <div class="row">
                  <div class="col-12">
                    
                      <div class="mb-1 fw-bold">Tareas</div>
                      <div class="table-responsive">
                        <table class="w-100">
                          <tbody>
                            <tr *ngFor="let tarea of tareasFormArray(sub).controls; let j = index" style="width: 100%;">
                              <td style="width: 50%;">
                                <mat-form-field appearance="outline" class="w-100 m-1">
                                    <mat-label>Nombre Tarea</mat-label>
                                  <input matInput [formControl]="asFormControl(tarea.get('nombre'))" placeholder="Nombre tarea" />
                                </mat-form-field>
                              </td>
                              <td style="width: 15%;">
                                <mat-form-field appearance="outline" class="w-100 m-1">
                                    <mat-label>Orden Tarea</mat-label>
                                  <input matInput [formControl]="asFormControl(tarea.get('n_orden'))" placeholder="Orden" type="number" />
                                </mat-form-field>
                              </td>
                              <td style="width: 35%;">
                                <mat-form-field appearance="outline" class="w-100 m-1">
                                     <mat-label>Tipo Tarea</mat-label>
                                  <mat-select [formControl]="asFormControl(tarea.get('tipoTareaId'))" placeholder="Tipo de tarea">
                                    <mat-option class="font-4" *ngFor="let dt of datatareas" [value]="dt.id">{{dt.nombre}}</mat-option>
                                  </mat-select>
                                </mat-form-field>
                              </td>
                           
                              <td class="text-left" style="width: 15%; vertical-align: middle;">
                                <ng-container *ngIf="tarea.get('id')?.value == null">
                                  <button mat-icon-button color="warn" (click)="eliminarTarea(sub, j)" matTooltip="Eliminar tarea" style="margin-left: 0;" [disabled]="!editarform">
                                    <mat-icon>delete</mat-icon>
                                  </button>
                                </ng-container>
                              </td>
                                <td class="text-center" style="width: 15%;">
                                <ng-container *ngIf="tarea.get('id')?.value != null; else eliminarTareaBtnCard">
                                  <mat-slide-toggle [formControl]="asFormControl(tarea.get('esta_activo'))" [disabled]="!editarform">Activo</mat-slide-toggle>
                                </ng-container>
                                <ng-template #eliminarTareaBtnCard>
                               
                                </ng-template>
                              </td> 
                            </tr>
                          </tbody>
                        </table>
                      </div>
                    
                  </div>
                </div>
              </div>
            </mat-card>
     
        </ng-container>
      </div>
    </app-block>
    
    <app-btns-actions (actionSecondary)="btnCancelar()" (actionPrimary)="btnGuardar()" icon="save"
      text-primary="Guardar" text-secondary="Cancelar" [disabled-p]="mantenedorForm.invalid || !editarform"></app-btns-actions>

  </app-block>

</app-container>
