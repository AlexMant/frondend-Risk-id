<app-container>
  <app-preloader *ngIf="preloader" size="small" message="Generando soliictud de retiro"></app-preloader>
    <app-block *ngIf="!preloader">
      <form class="row" [formGroup]="mantenedorForm">
        
        <div class="col-12 col-ms-6 col-md-12">
            <mat-form-field appearance="outline" class="w-100">
                <mat-label>Observación para el retiro</mat-label>
                <!-- <input matInput formControlName="vobservacion" autocomplete="off" /> -->
                <textarea matInput maxlength="999" cols="50" rows="5" formControlName="vobservacion_retiro"
                  autocomplete="off"></textarea>
              </mat-form-field>
    </div>
    <div class="col-12 col-ms-6 col-md-12"></div>
    <div class="col-12 col-ms-6 col-md-12">
        <small class="font-4 alerta-texto-form ">Se informara a GTEK vía e-mail .</small>
       
    </div>
  
        
  
  
      </form>
    </app-block>
 
    <app-btns-actions *ngIf="!preloader" (actionSecondary)="onCloseClick()" (actionPrimary)="guardar()" icon="save" text-primary="Guardar"
      text-secondary="Cerrar" [disabled-p]="mantenedorForm.invalid"></app-btns-actions>
  </app-container>
